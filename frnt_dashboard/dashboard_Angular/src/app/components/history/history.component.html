<div class="card">
  <h2>Product Change History</h2>

  <div class="date-control">
    <div class="form-group">
      <label for="sinceDate">Show changes since</label>
      <input type="date" id="sinceDate" [(ngModel)]="sinceDate" />
      <button class="btn" (click)="updateDateRange()">Update</button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Loading change history...</div>

  <div *ngIf="!loading && recentChanges.length === 0" class="no-results">
    <p>No product changes found since {{ sinceDate | date }}</p>
  </div>

  <div
    *ngIf="!loading && recentChanges.length > 0"
    class="history-list-container"
  >
    <div class="timeline">
      <div *ngFor="let change of recentChanges" class="timeline-item">
        <div class="timeline-date">
          {{ change.timestamp | date : "medium" }}
        </div>
        <div class="timeline-content">
          <div class="change-header">
            <span class="change-type">{{ change.changeType }}</span>
            <span class="product-id">Product ID: {{ change.productId }}</span>
          </div>
          <div class="change-details">
            <p>
              Changed from <strong>{{ change.oldValue }}</strong> to
              <strong>{{ change.newValue }}</strong>
            </p>
          </div>
          <div class="actions">
            <a [routerLink]="['/products', change.productId]" class="btn btn-sm"
              >View Product</a
            >
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
