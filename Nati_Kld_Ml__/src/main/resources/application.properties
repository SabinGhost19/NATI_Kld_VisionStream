spring.application.name=Nati_Kld_ML

spring.cassandra.contact-points=${SPRING_CASSANDRA_CONTACT_POINTS:localhost}
spring.cassandra.port=${SPRING_CASSANDRA_PORT:9042}
spring.cassandra.keyspace-name=${SPRING_CASSANDRA_KEYSPACE:products_keyspace}
spring.cassandra.username=${SPRING_CASSANDRA_USERNAME:cassandra}
spring.cassandra.password=${SPRING_CASSANDRA_PASSWORD:cassandra}
spring.cassandra.local-datacenter=${SPRING_CASSANDRA_LOCAL_DATACENTER:datacenter1}
spring.cassandra.schema-action=CREATE_IF_NOT_EXISTS

server.port=8080

management.endpoints.web.exposure.include=health,info

logging.level.org.springframework.data.cassandra.core=INFO
logging.level.com.example=DEBUG
logging.level.root=INFO