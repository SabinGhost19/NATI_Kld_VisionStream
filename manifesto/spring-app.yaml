apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
  labels:
    app: spring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
        - name: spring-app
          image: spring-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_CASSANDRA_CONTACT_POINTS
              value: "cassandra-0.cassandra-headless.default.svc.cluster.local,cassandra-1.cassandra-headless.default.svc.cluster.local,cassandra-2.cassandra-headless.default.svc.cluster.local,cassandra-3.cassandra-headless.default.svc.cluster.local"
            - name: SPRING_DATA_CASSANDRA_PORT
              value: "9042"
            - name: SPRING_DATA_CASSANDRA_KEYSPACE
              value: "my_keyspace"
            - name: SPRING_DATA_CASSANDRA_USERNAME
              value: "cassandra"
            - name: SPRING_DATA_CASSANDRA_PASSWORD
              value: "cassandra"
            - name: SPRING_DATA_CASSANDRA_LOCAL_DATACENTER
              value: "datacenter1"
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "0.5"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: spring-app
  labels:
    app: spring-app
spec:
  selector:
    app: spring-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
